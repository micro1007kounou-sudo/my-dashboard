<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>AIタロット占い（プロンプト生成版）</title>
  <style>
    body {
      background: #111;
      color: #f5f5f5;
      font-family: system-ui, sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      color: #ffd86b;
      letter-spacing: 0.1em;
      font-size: 20px;
    }

    #status {
      margin-top: 12px;
      font-size: 14px;
      color: #ffeb9c;
      white-space: pre-line;
      min-height: 2em;
    }

    button {
      margin-top: 10px;
      padding: 6px 16px;
      border-radius: 999px;
      border: 1px solid #ffd86b;
      background: transparent;
      color: #ffd86b;
      cursor: pointer;
      font-size: 13px;
      margin-inline: 4px;
    }

    button:disabled {
      opacity: 0.3;
      cursor: default;
    }

    #grid-container {
      width: 640px;
      max-width: 95vw;
      margin: 10px auto 0;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 8px;
      justify-items: center;
    }

    .grid-card {
      width: 70px;
      height: 110px;
      border-radius: 8px;
      background: radial-gradient(circle at 30% 30%, #444, #111);
      border: 1px solid #555;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .grid-card.selected {
      box-shadow: 0 0 12px rgba(255, 216, 107, 0.9);
      border-color: #ffd86b;
      transform: translateY(-4px) scale(1.02);
    }

    #spread-container {
      width: 420px;
      max-width: 95vw;
      margin: 30px auto 0;
    }

    .spread-row {
      display: flex;
      justify-content: space-between;
      margin: 18px 0;
    }

    .spread-row.center {
      justify-content: center;
    }

    .spread-card {
      width: 90px;
      height: 140px;
      border-radius: 8px;
      background: #faf5e6;
      color: #222;
      border: 1px solid #ffd86b;
      box-shadow: 0 0 14px rgba(255, 216, 107, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      box-sizing: border-box;
      font-size: 12px;
    }

    .spread-label {
      font-size: 11px;
      color: #ccc;
      margin-top: 4px;
    }

    /* モーダル */
    #modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
    }

    #modal-content {
      background: #222;
      padding: 20px;
      border-radius: 8px;
      width: 90%;
      max-width: 600px;
      text-align: left;
      color: #eee;
    }

    #prompt-text {
      white-space: pre-wrap;
      background: #111;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #444;
      font-size: 13px;
      line-height: 1.6;
      max-height: 300px;
      overflow-y: auto;
      margin-top: 8px;
    }
    @keyframes soft-shake {
  0%   { transform: translate(0, 0); }
  25%  { transform: translate(0.5px, -0.5px); }
  50%  { transform: translate(-0.5px, 0.5px); }
  75%  { transform: translate(0.5px, 0.5px); }
  100% { transform: translate(0, 0); }
}

.shuffling {
  animation: soft-shake 0.12s infinite;
  border-color: #ffd86b;
}

  </style>
</head>
<body>

  <h1>AIタロット占い（プロンプト生成版）</h1>

  <div id="status">① まずはシャッフルしましょう</div>

  <div>
    <button id="shuffle-btn">① シャッフル</button>
    <button id="place-btn" disabled>③ 配置</button>
    <button id="prompt-btn" disabled>④ プロンプト表示</button>
    <button id="reset-btn">リセット</button>
  </div>

  <div id="grid-container"></div>

  <div id="spread-container">
    <div class="spread-row center">
      <div>
        <div class="spread-card" id="spread1"></div>
        <div class="spread-label">過去</div>
      </div>
    </div>

    <div class="spread-row">
      <div>
        <div class="spread-card" id="spread4"></div>
        <div class="spread-label">対策</div>
      </div>
      <div>
        <div class="spread-card" id="spread2"></div>
        <div class="spread-label">現在</div>
      </div>
    </div>

    <div class="spread-row">
      <div>
        <div class="spread-card" id="spread5"></div>
        <div class="spread-label">周囲</div>
      </div>
      <div>
        <div class="spread-card" id="spread3"></div>
        <div class="spread-label">未来</div>
      </div>
    </div>

    <div class="spread-row center">
      <div>
        <div class="spread-card" id="spread6"></div>
        <div class="spread-label">結果</div>
      </div>
    </div>
  </div>

  <!-- モーダル -->
  <div id="modal">
    <div id="modal-content">
      <button id="close-modal">閉じる</button>
      <h3>④ AIに貼り付けて占い結果を受け取りましょう</h3>
      <p>このプロンプトを ChatGPT / Claude / Gemini / DeepSeek / ローカルAI に貼り付けてください。</p>
      <div id="prompt-text"></div>
      <button id="copy-btn">コピー</button>
    </div>
  </div>

  <script>
    const tarot = {
      "愚者": "自由・冒険・無邪気・新しい旅立ち",
      "魔術師": "創造・始まり・才能・行動力",
      "女教皇": "直感・静寂・精神性・冷静さ",
      "女帝": "豊かさ・愛情・育成",
      "皇帝": "支配・安定・責任",
      "法王": "伝統・助言・精神性",
      "恋人": "選択・愛・関係性",
      "戦車": "勝利・前進・意志",
      "力": "勇気・忍耐・内なる強さ",
      "隠者": "探求・内省・孤独",
      "運命の輪": "転機・変化・チャンス",
      "正義": "公平・バランス・判断",
      "吊るされた男": "犠牲・視点変更・停滞",
      "死神": "終わり・再生・変化",
      "節制": "調和・節度・バランス",
      "悪魔": "誘惑・依存・束縛",
      "塔": "崩壊・衝撃・リセット",
      "星": "希望・癒し・未来",
      "月": "不安・迷い・潜在意識",
      "太陽": "成功・幸福・活力",
      "審判": "復活・決断・再評価",
      "世界": "完成・達成・統合"
    };

    const positions = {
      1: "過去",
      2: "現在",
      3: "未来",
      4: "対策",
      5: "周囲",
      6: "結果"
    };

    const gridContainer = document.getElementById("grid-container");
    const shuffleBtn = document.getElementById("shuffle-btn");
    const placeBtn = document.getElementById("place-btn");
    const promptBtn = document.getElementById("prompt-btn");
    const resetBtn = document.getElementById("reset-btn");
    const statusEl = document.getElementById("status");

    const modal = document.getElementById("modal");
    const promptText = document.getElementById("prompt-text");
    const closeModal = document.getElementById("close-modal");
    const copyBtn = document.getElementById("copy-btn");

    let selectedCards = [];
    let step = 1;

    function initGrid() {
      gridContainer.innerHTML = "";
      Object.keys(tarot).forEach(name => {
        const div = document.createElement("div");
        div.className = "grid-card";
        div.dataset.cardName = name;
        div.addEventListener("click", onCardClick);
        gridContainer.appendChild(div);
      });
    }

    function updateStatus() {
      if (step === 1) statusEl.textContent = "① まずはシャッフルしましょう";
      if (step === 2) statusEl.textContent = "② 気になるカードを6枚選んでください";
      if (step === 3) statusEl.textContent = "③ 配置ボタンを押して結果を並べましょう";
      if (step === 4) statusEl.textContent = "④ AIに貼り付けて占い結果を受け取りましょう";
    }

    function updateButtons() {
      shuffleBtn.disabled = step !== 1;
      placeBtn.disabled = step !== 3;
      promptBtn.disabled = step !== 4;
    }

    function onCardClick(e) {
      if (step !== 2) return;

      const div = e.currentTarget;
      if (div.classList.contains("selected")) return;
      if (selectedCards.length >= 6) return;

      div.classList.add("selected");
      selectedCards.push(div.dataset.cardName);

      if (selectedCards.length === 6) {
        step = 3;
        updateStatus();
        updateButtons();
      }
    }

shuffleBtn.addEventListener("click", () => {
  resetAll(false);
  step = 2;
  updateStatus();
  updateButtons();

  // --- シャッフル演出（控えめ） ---
  const cards = document.querySelectorAll(".grid-card");
  cards.forEach(c => c.classList.add("shuffling"));

  // 1.5秒後に停止
  setTimeout(() => {
    cards.forEach(c => c.classList.remove("shuffling"));
  }, 1000);
});

    placeBtn.addEventListener("click", () => {
      if (step !== 3) return;

      for (let i = 1; i <= 6; i++) {
        document.getElementById(`spread${i}`).textContent = selectedCards[i - 1];
      }

      step = 4;
      updateStatus();
      updateButtons();
    });

    function buildPrompt() {
      let text = "";
      text += "あなたは熟練したタロット占い師です。\n";
      text += "以下のヘキサグラムスプレッドから、質問者の現状と今後の流れを総合的に読み解いてください。\n";
      text += "カードの意味を単に説明するのではなく、全体の流れ・因果関係・最終的なメッセージを中心にまとめてください。\n\n";
      text += "【スプレッド】\n";

      for (let i = 1; i <= 6; i++) {
        const name = selectedCards[i - 1];
        const meaning = tarot[name];
        text += `${positions[i]}：${name}（意味：${meaning}）\n`;
      }

      text += "\n最後に、質問者への総合アドバイスを1つ書いてください。";
      return text;
    }

    promptBtn.addEventListener("click", () => {
      promptText.textContent = buildPrompt();
      modal.style.display = "flex";
    });

    closeModal.addEventListener("click", () => {
      modal.style.display = "none";
    });

    copyBtn.addEventListener("click", () => {
      navigator.clipboard.writeText(promptText.textContent);
      copyBtn.textContent = "コピーしました！";
      setTimeout(() => copyBtn.textContent = "コピー", 1500);
    });

    resetBtn.addEventListener("click", () => resetAll(true));

    function resetAll(resetStep = true) {
      selectedCards = [];
      document.querySelectorAll(".grid-card").forEach(c => c.classList.remove("selected"));
      document.querySelectorAll(".spread-card").forEach(c => c.textContent = "");
      modal.style.display = "none";

      if (resetStep) step = 1;
      updateStatus();
      updateButtons();
    }

    initGrid();
    updateStatus();
    updateButtons();
  </script>
</body>
</html>
