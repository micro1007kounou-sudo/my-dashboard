<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIタロット占い</title>
  <!-- CSSファイルの読み込み -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>AIタロット占い</h1>

  <div id="status">① 占うテーマを選んでシャッフルしましょう</div>

<div class="theme-selector">
  <select id="tarot-theme">
    <option value="general">総合運（全体的な流れ）</option>
    <!-- 恋愛運を3つに細分化 -->
    <option value="love_no_partner">恋愛運：パートナーなし（新しい出会い）</option>
    <option value="love_with_partner">恋愛運：パートナーあり（現在の関係）</option>
    <option value="love_unrequited">恋愛運：片思い（相手の気持ち・進展）</option>
    <option value="work">仕事運・キャリア</option>
    <option value="money">金運・財運</option>
  </select>
</div>

  <div class="controls">
    <button id="shuffle-btn">シャッフル</button>
    <button id="place-btn" disabled>配置</button>
    <button id="prompt-btn" disabled>プロンプト表示</button>
    <button id="reset-btn">リセット</button>
  </div>

<div id="spread-container">
  <div class="spread-card-node" id="node1"><div class="spread-card" id="spread1"></div></div>
  <div class="spread-card-node" id="node2"><div class="spread-card" id="spread2"></div></div>
  <div class="spread-card-node" id="node3"><div class="spread-card" id="spread3"></div></div>
  <div class="spread-card-node" id="node4"><div class="spread-card" id="spread4"></div></div>
  <div class="spread-card-node" id="node5"><div class="spread-card" id="spread5"></div></div>
  <div class="spread-card-node" id="node6"><div class="spread-card" id="spread6"></div></div>
</div>

  <!-- カード一覧が表示される場所 -->
  <div id="grid-container"></div>

  <!-- モーダル（プロンプト表示） -->
  <div id="modal">
    <div id="modal-content">
      <button id="close-modal">閉じる</button>
      <h3 style="color: #ffd86b; margin-top: 0;">占いプロンプトが完成しました</h3>
      <p style="font-size: 0.9em; line-height: 1.5;">
        1. 下のボタンでプロンプトを<b>コピー</b>してください。<br>
        2. お好きなAIを開いて<b>貼り付け</b>、送信してください。
      </p>
      
      <div id="prompt-text"></div>
      
      <div class="modal-buttons" style="border-bottom: 1px solid #444; padding-bottom: 15px; margin-bottom: 15px;">
        <button id="copy-btn">プロンプトをコピーする</button>
      </div>

      <p style="font-size: 0.8em; text-align: center; color: #ffeb9c; margin-bottom: 10px;">コピーした内容を貼り付けて占う（無料AIリンク）</p>
      <div class="modal-buttons">
        <a href="https://gemini.google.com/app" target="_blank" class="link-button gemini-btn">Gemini</a>
        <a href="https://chatgpt.com/" target="_blank" class="link-button chatgpt-btn">ChatGPT</a>
        <a href="https://claude.ai/" target="_blank" class="link-button claude-btn">Claude</a>
      </div>
    </div>
  </div>

  <footer style="text-align:center; margin-top:40px;">
    <a href="../index.html">
      <img src="../bannar_S.png" alt="Back to Dashboard" 
           style="width:100%; max-width:360px; height:auto; opacity:0.95;">
    </a>

    <p style="font-size: 12px; color: #aaa; margin-top: 10px;">
      タロットカード画像引用元：<a href="https://amateras.blog/" target="_blank" style="color:#ffd86b;">amateras.blog</a>
    </p>
  </footer>

  <!-- JavaScriptファイルの読み込み（最後に1回だけ） -->
  <script src="script.js"></script>

</body>
</html>
