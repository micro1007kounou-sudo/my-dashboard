<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電気用計算ツール</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>⚡ 電気用計算ツール</h1>

    <div class="card">
        <h2>0. 単位相互換算</h2>
        <p class="sub-text">※数値を入力し、接頭辞と種類（単位記号）を選ぶと、すべて一斉換算します。</p>
        
        <div class="convert-main-row">
            <div class="input-group val-input">
                <label for="convert-value">数値入力</label>
                <input type="number" id="convert-value" step="any" placeholder="例: 1500">
            </div>
            <div class="input-group prefix-select">
                <label for="convert-unit">接頭辞</label>
                <select id="convert-unit">
                    </select>
            </div>
            <div class="input-group type-select">
                <label for="unit-type">種類（単位）</label>
                <select id="unit-type">
                    <option value="" selected>なし (倍率のみ)</option>
                    <option value="V">V (電圧)</option>
                    <option value="A">A (電流)</option>
                    <option value="W">W (電力)</option>
                    <option value="Ω">Ω (抵抗)</option>
                    <option value="J">J (電力量)</option>
                    <option value="Hz">Hz (周波数)</option>
                </select>
            </div>
        </div>

        <div id="convert-result-grid" class="convert-result-grid">
            </div>
    </div>

    <div class="card">
        <h2>1. オームの法則計算</h2>
        <p class="sub-text">※求めたい項目を空欄にして、残りの2つを入力してください。</p>
        
        <div class="input-row-three">
            <div class="input-group">
                <label for="voltage">電圧 V (V)</label>
                <input type="number" id="voltage" step="any" placeholder="例: 12">
            </div>
            <div class="input-group">
                <label for="current">電流 I (A)</label>
                <input type="number" id="current" step="any" placeholder="例: 2">
            </div>
            <div class="input-group">
                <label for="resistance">抵抗 R (Ω)</label>
                <input type="number" id="resistance" step="any" placeholder="例: 6">
            </div>
        </div>
        
        <button id="btn-ohm">オームの法則を計算</button>
        <div id="ohm-result" class="result" style="display: none;"></div>
    </div>

    <div class="card">
        <h2>2. 合成抵抗計算（最大10個）</h2>
        <p class="sub-text">※入力された欄の数値のみで計算します。空欄は無視されます。</p>
        
        <div id="resistor-grid" class="resistor-grid">
            </div>
        
        <div class="btn-control-row">
            <button id="btn-add-resistor" class="btn-outline">＋ 抵抗を追加</button>
            <button id="btn-remove-resistor" class="btn-outline btn-danger-outline">ー 削除</button>
        </div>
        
        <div class="btn-row">
            <button id="btn-series">直列接続 (R1 + R2 + ...)</button>
            <button id="btn-parallel" class="btn-secondary">並列接続 (1/Rの合成)</button>
        </div>
        <div id="resistor-result" class="result" style="display: none;"></div>
    </div>

    <div class="card">
        <h2>3. 抵抗カラーコード計算・逆引き</h2>
        <p class="sub-text">※色を選んで抵抗値を出すことも、数値を入力して色を逆引きすることも可能です。</p>
        
        <div class="cc-reverse-row">
            <div class="input-group cc-rev-val">
                <label for="cc-reverse-value">抵抗値から逆引き検索</label>
                <input type="number" id="cc-reverse-value" step="any" placeholder="例: 4.7">
            </div>
            <div class="input-group cc-rev-unit">
                <label for="cc-reverse-unit">単位</label>
                <select id="cc-reverse-unit">
                    <option value="1" selected>Ω</option>
                    <option value="1000">kΩ</option>
                    <option value="1000000">MΩ</option>
                </select>
            </div>
            <div class="input-group cc-rev-btn-wrap">
                <label>&nbsp;</label>
                <button id="btn-cc-reverse">逆引き実行</button>
            </div>
        </div>

        <div class="resistor-visual-container">
            <div class="resistor-body">
                <div class="lead-left"></div>
                <div id="visual-band1" class="v-band"></div>
                <div id="visual-band2" class="v-band"></div>
                <div id="visual-band3" class="v-band"></div>
                <div id="visual-band4" class="v-band"></div>
                <div id="visual-band5" class="v-band"></div>
                <div class="lead-right"></div>
            </div>
        </div>

        <div class="cc-control-grid">
            <div class="input-group cc-full-width">
                <label for="cc-band-count">バンド数（色帯の数）</label>
                <select id="cc-band-count">
                    <option value="4" selected>4本帯 (一般抵抗)</option>
                    <option value="5">5本帯 (精密抵抗)</option>
                </select>
            </div>
        </div>

        <div class="cc-select-grid">
            <div class="input-group" id="group-band1">
                <label>第1バンド</label>
                <select id="cc-band1"></select>
            </div>
            <div class="input-group" id="group-band2">
                <label>第2バンド</label>
                <select id="cc-band2"></select>
            </div>
            <div class="input-group" id="group-band3">
                <label id="label-band3">第3バンド</label>
                <select id="cc-band3"></select>
            </div>
            <div class="input-group" id="group-multiplier">
                <label>乗算器</label>
                <select id="cc-multiplier"></select>
            </div>
            <div class="input-group" id="group-tolerance">
                <label>公差 (許容差)</label>
                <select id="cc-tolerance"></select>
            </div>
        </div>

        <div id="cc-result" class="result" style="text-align: center; font-size: 1.2rem; background-color: #eff6ff; border-left-color: #2563eb;">
            </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
