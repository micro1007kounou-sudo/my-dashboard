<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>APIテスト</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>

    <!-- 天気情報 -->
    <h2>現在の天気(京都）</h2>
       <p>30秒ごとに更新</p>

    <p>最終更新：<span id="updated"></span></p>
    <p>気温：<span id="temp"></span>℃</p>
    <p>湿度：<span id="humidity"></span>%</p>
    <p>風速：<span id="wind"></span> m/s</p>
    <p>風向：<span id="windDir"></span></p>
    <p>気圧：<span id="pressure"></span> hPa</p>
    <p>降水量：<span id="precip"></span> mm</p>
    <p>天気コード：<span id="code"></span></p>

    <hr>

    <!-- 金融情報 -->
    <h2>現在の金融情報</h2>
       <p>60秒ごとに更新</p>

    <p>USDT/JPY（ドル円代替）：<span id="usdt"></span>円</p>
    <p>BTC/JPY（ビットコイン）：<span id="btc"></span>円</p>
    <p>PAXG/JPY（金価格1g）：<span id="gold"></span>円</p>


    <hr>
<h2>最新ニュース（NHK）</h2>
<ul id="news-list"></ul>

    <!-- 最後にあなたのスクリプト -->
    <script src="script.js"></script>

</body>

</html>
