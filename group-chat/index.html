<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オープン・グループチャット</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="chat-notice">
    ブラウザを閉じると、あなたの画面の内容はすべて消去されます。相手側には残りますが、<strong>参加者が全員いなくなった時点で、チャット内容は完全に消去</strong>されます。<br>
    メッセージはサーバーに一切保存されません。
  </div>

  <div id="login-screen">
    <h2 style="text-align: center; margin-bottom: 5px; font-size: 24px;">チャットに入室</h2>
    
    <p style="font-size: 13px; color: #666; line-height: 1.6; margin: 15px 0 25px 0; padding: 0; text-align: center;">
      名前を入力するだけで、誰でも自由に参加できるリアルタイムチャットです。<br>
      ブラウザを閉じる・再読み込み・または20分放置で自動的に退出になります。
    </p>

    <div style="display: flex; flex-direction: column; gap: 12px; max-width: 340px; margin: 0 auto;">
      <input type="text" id="username-input" placeholder="あなたの名前（ニックネーム）" maxlength="12" style="padding: 12px 16px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; width: 100%; box-sizing: border-box;">
      <button id="join-btn" style="padding: 12px; border-radius: 8px; border: none; background: #007aff; color: #fff; font-size: 15px; font-weight: bold; cursor: pointer; width: 100%;">入室する</button>
    </div>
  </div>

  <div id="chat-container" style="display: none;">
    <div class="chat-header">
      <span id="header-user-info">あなた: 未入室</span>
      <span id="header-online-count" style="float: right; color: #34c759;">● オンライン: 0人</span>
    </div>

    <div id="messages"></div>

    <div class="input-area">
      <input type="text" id="message-input" placeholder="メッセージを入力..." maxlength="200">
      <button id="send-btn">送信</button>
    </div>
  </div>

  <div id="loading-overlay">
    <div class="loading-box">
      <div class="spinner"></div>
      <h2>サーバー接続中</h2>
      <p>しばらくそのままでお待ちください...</p>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>

<div id="footer"></div>
<script>
  fetch("../footer.html")
    .then(res => res.text())
    .then(html => document.getElementById("footer").innerHTML = html);
</script>
</html>
