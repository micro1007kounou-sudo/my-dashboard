<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>グループチャット</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="chat-notice">
    <strong>参加者が全員いなくなった時点でチャット内容は完全に消去されます。</strong><br>
    名前、メッセージはサーバーに保存されません。入室している人以外からは絶対に見られない仕組みになっています。再読み込み等で退出になりますが誰かが残っており同じ名前で入室すれば再度参加できます。
  </div>

  <div id="login-screen">
    <h2 style="text-align: center; margin-bottom: 5px; font-size: 24px;">グループチャットに入室</h2>
    
    <p style="font-size: 13px; color: #666; line-height: 1.6; margin: 15px 0 25px 0; padding: 0; text-align: center;">
      名前を入力するだけで、誰でも自由に参加できるリアルタイムチャットです。<br>
      全員が退出するとログは全て自動消滅します。
    </p>

    <div style="display: flex; flex-direction: column; gap: 12px; max-width: 340px; margin: 0 auto;">
      <input type="text" id="username-input" placeholder="あなたの名前（ニックネーム）" maxlength="12" style="padding: 12px 16px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; width: 100%; box-sizing: border-box;">
      <button id="join-btn" style="padding: 12px; border-radius: 8px; border: none; background: #007aff; color: #fff; font-size: 15px; font-weight: bold; cursor: pointer; width: 100%;">入室する</button>
    </div>
  </div>

  <div id="chat-container" style="display: none;">
<div class="chat-header">
  <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.08); padding-bottom: 6px; margin-bottom: 6px;">
    <span style="font-size: 14px; color: #2c251e; letter-spacing: 0.5px;">👥 グループチャット</span>
    <button id="leave-btn" onclick="location.reload();">退出</button>
  </div>

  <div style="display: flex; justify-content: space-between; font-size: 11px; color: #5c5246; font-weight: normal;">
    <span id="header-user-info">あなた: ---</span>
    <span id="header-online-count"><span style="color: #4caf50; font-weight: bold; margin-right: 2px;">●</span>オンライン: 0人</span>
  </div>
</div>

    <div id="messages"></div>

    <div class="input-area">
      <input type="text" id="message-input" placeholder="メッセージを入力..." maxlength="200">
      <button id="send-btn">送信</button>
    </div>
  </div>

  <div id="loading-overlay">
    <div class="loading-box">
      <div class="spinner"></div>
      <h2>サーバー接続中</h2>
      <p>しばらくそのままでお待ちください...</p>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>

<div id="footer"></div>
<script>
  fetch("../footer.html")
    .then(res => res.text())
    .then(html => document.getElementById("footer").innerHTML = html);
</script>
</html>
