<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>IO-Simulator-02</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="status-bar" id="status-bar">
        <div class="status-lines">
            <div id="status-x">X: 0000 0000 0000 0000 (Hex: 0x0000 | Dec: 0)</div>
            <div id="status-y">Y: 0000 0000 0000 0000 (Hex: 0x0000 | Dec: 0)</div>
        </div>
        <div class="status-actions">
            <button id="run-btn" onclick="startSimulation()">ロジック起動</button>
            <button id="stop-btn" onclick="stopSimulation()">停止</button>
            <span id="run-status">● 停止中</span>
        </div>
    </div>

    <div class="main-content">
    <h2>簡易I/O（XY各16点）シミュレータ</h2>
    
    <div class="info-box">
        <p>まず編集対象を選び論理式（AND,OR,NOT)を選択しロジックを書き込んでください。<br>
        「ロジック起動」で処理を開始します。入力をチェックボックスまたはプッシュボタンで設定すれば条件に合わせて出力します。<br>
        </p>
    </div>

        <h3>入力 X1-X16 (トグル:チェック / 押しボタン:PB)
            <button onclick="resetContacts()" style="margin-left: 20px;">接点を全てリセット</button>
        </h3>
        <div id="inputs-x" class="one-line-group"></div>

        <h3>出力 Y1-Y16</h3>
        <div id="outputs-y" class="one-line-group"></div>

        <hr>

        <h3>編集対象: 
            <select id="target-selector" onchange="loadLogic(this.value)">
                <script>for(let i=1; i<=16; i++) document.write(`<option value="Y${i}">Y${i}</option>`);</script>
            </select>
        </h3>
        <div class="logic-bar">
            <label id="target-label"><b>Y1 = </b></label>
            <div id="logic-container" class="logic-container"></div>
            
            <button onclick="addBlock()">＋</button>
            <button onclick="removeBlock()">－</button>
            
            <span style="margin-left: 10px;">
                <button onclick="writeToStore()" style="background:#2196F3; color:white;">書き込み</button>
                <button onclick="clearCurrentLogic()" style="background:#f44336; color:white;">削除</button>
            </span>
        </div>

        <h3>ロジックリスト</h3>
        <div id="logic-list"></div>
        <br>

<div class="footer-ops">
            <button onclick="exportLogic()">ロジックをエクスポート</button>
            <button onclick="document.getElementById('file-input').click()">ロジックをインポート</button>
            <input type="file" id="file-input" style="display:none" onchange="importLogic(event)">
            <button onclick="confirmClearAll()" style="color:red; margin-left: 20px;">全てリセット</button>
        </div>
    </div>

    <script src="logic.js"></script>

    <div id="footer"></div>
    <script>
      fetch("../footer.html")
        .then(res => res.text())
        .then(html => document.getElementById("footer").innerHTML = html);
    </script>
</body>
</html>
