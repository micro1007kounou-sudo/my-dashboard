<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>二人チャット</title>
    </head>
  <title>二人チャット</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="loading-overlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <h2>サーバー起動中...</h2>
    <p>スリープからの復帰に30秒ほどかかる場合があります<br>そのまましばらくお待ちください。</p>
  </div>
</div>
<div class="chat-notice">

    <strong>参加者が全員いなくなった時点で、チャット内容は完全に消去</strong>されます。<br>

    メッセージはサーバーに一切保存されません。入室している人以外（第三者）からは見られない仕組みになっています

  </div>

<div id="login-screen" class="chat-container" style="max-width: 400px; margin: 50px auto; padding: 20px; text-align: center;">
  <h2>プライベートチャットに入室</h2>
  
<p style="font-size: 12px; color: #666; line-height: 1.6; margin: 15px 0 25px 0; padding: 0;">
  共通の合言葉を持つ先着2人だけが参加できる簡易チャットルームです
</p>

  <div style="margin-bottom: 15px;">
    <input id="usernameInput" type="text" placeholder="あなたの名前" style="width: 80%; padding: 8px;">
  </div>
  <div style="margin-bottom: 20px;">
    <input id="roomInput" type="text" placeholder="共通の合言葉（パスワード）" style="width: 80%; padding: 8px;">
  </div>
  <button id="joinBtn" style="padding: 10px 20px; cursor: pointer;">入室する</button>
</div>

<div class="chat-container" id="chat-screen" style="display: none;">
  <div class="chat-header">
    プライベートチャット（合言葉: <span id="roomName">-</span>）<br>
    あなた: <span id="selfName">-</span><br>
    相手: <span id="otherName">未接続</span>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input id="msgInput" type="text" placeholder="メッセージを入力…">
    <button id="sendBtn">送信</button>
  </div>
</div>

<script src="script.js"></script>
<div id="footer"></div>

    <script>
      fetch("../footer.html")
        .then(res => res.text())
        .then(html => document.getElementById("footer").innerHTML = html);
    </script>
</body>
</html>
