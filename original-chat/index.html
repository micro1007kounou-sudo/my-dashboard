<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>プライベートチャット</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="loading-overlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <h2>サーバー起動中...</h2>
    <p>スリープからの復帰に30秒ほどかかる場合があります<br>そのまましばらくお待ちください。</p>
  </div>
</div>
<div class="chat-notice">
  ブラウザを閉じると、あなたの画面の内容はすべて消去されます。相手側には残りますが、相手がブラウザを閉じた時点で相手側の内容も完全に消去されます。<br>
  メッセージはサーバーに一切保存されません。
</div>

<div id="login-screen" class="chat-container" style="max-width: 400px; margin: 50px auto; padding: 20px; text-align: center;">
  <h2>チャットに入室</h2>
  
  <p style="font-size: 13px; color: #666; line-height: 1.5; margin: -5px 0 20px 0; padding: 0 10px;">
    共通の合言葉を持つ先着2人だけが参加できる簡易チャットルームです。<br>ブラウザを閉じる、再読み込みまたは20分放置で自動的に退出になります
  </p>

  <div style="margin-bottom: 15px;">
    <input id="usernameInput" type="text" placeholder="あなたの名前" style="width: 80%; padding: 8px;">
  </div>
  <div style="margin-bottom: 20px;">
    <input id="roomInput" type="text" placeholder="共通の合言葉（パスワード）" style="width: 80%; padding: 8px;">
  </div>
  <button id="joinBtn" style="padding: 10px 20px; cursor: pointer;">入室する</button>
</div>

<div class="chat-container" id="chat-screen" style="display: none;">
  <div class="chat-header">
    プライベートチャット（合言葉: <span id="roomName">-</span>）<br>
    あなた: <span id="selfName">-</span><br>
    相手: <span id="otherName">未接続</span>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input id="msgInput" type="text" placeholder="メッセージを入力…">
    <button id="sendBtn">送信</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
