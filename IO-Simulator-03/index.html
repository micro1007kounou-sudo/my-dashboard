<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>IO-Simulator-03</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="status-bar" id="status-bar">
    <div id="status-x">X: 0000 0000 0000 0000 (Hex: 0x0000 | Dec: 0)</div>
    <div id="status-m">M: 0000 0000 0000 0000 (Hex: 0x0000 | Dec: 0)</div>
    <div id="status-t">T: 0000 0000 0000 0000 (Hex: 0x0000 | Dec: 0)</div>
    <div id="status-y">Y: 0000 0000 0000 0000 (Hex: 0x0000 | Dec: 0)</div>
</div>

<div class="main-content">
    <h2>I/O シミュレータ_03</h2>
    
    <h3>入力 X1-X16 (トグル:チェック / 押しボタン:PB)
        <span style="font-size: 0.6em; margin-left: 15px;">
            <button onclick="resetInputs()">入力のみOFF</button>
            <button onclick="masterReset()" style="color: red;">全体リセット</button>
        </span>
    </h3>
    <div id="inputs-x" class="one-line-group"></div>

    <h3>内部リレー M1-M16</h3>
    <div id="inputs-m" class="one-line-group"></div>

    <h3>タイマー T1-T16</h3>
    <div id="timers-t"></div>

    <h3>出力 Y1-Y16</h3>
    <div id="outputs-y" class="one-line-group"></div>

    <hr>

    <h3>編集対象: 
        <select id="target-selector" onchange="loadLogic(this.value)"></select>
    </h3>
    <div class="logic-bar">
        <label id="target-label"><b>M1 = </b></label>
        <div id="logic-container" class="logic-container"></div>
        <button onclick="addBlock()">＋</button>
        <button onclick="removeBlock()">－</button>
        <span style="margin-left: 10px;">
            <button onclick="writeToStore()" style="background:#2196F3; color:white;">書き込み</button>
            <button onclick="clearCurrentLogic()" style="background:#f44336; color:white;">削除</button>
        </span>
        <span style="margin-left:20px; border:1px solid #ccc; padding:5px;">
            <button id="run-btn" onclick="startSimulation()" style="background:#4CAF50; color:white;">全実行</button>
            <button id="stop-btn" onclick="stopSimulation()" style="background:#607D8B; color:white;">停止</button>
            <span id="run-status" style="margin-left:10px; font-weight:bold; color:red;">● 停止中</span>
        </span>
    </div>

    <h3>ロジックリスト</h3>
    <div id="logic-list"></div>

    <div class="footer-ops">
        <button onclick="exportLogic()">ロジックをエクスポート</button>
        <button onclick="document.getElementById('file-input').click()">ロジックをインポート</button>
        <input type="file" id="file-input" style="display:none" onchange="importLogic(event)">
        <button onclick="confirmClearAll()" style="color:red; margin-left: 20px;">全てリセット</button>
    </div>
</div>
<script src="logic.js"></script>
</body>
</html>
