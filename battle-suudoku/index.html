<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>陣取り数独（対戦版）</title>
<link rel="stylesheet" href="battle.css">
</head>
<body>

<h2>陣取り数独（対戦版）</h2>
<div id="player-status">
  <span id="my-status">あなた: -- (IP: --)</span>
  <span id="status-separator"> | </span>
  <span id="other-status">相手: -- (IP: --)</span>
</div>

<div id="control-panel">
  <label for="difficulty-select">難易度:</label>
<select id="difficulty-select">
  <option value="sudden_death">⚡早押し勝負 (空白1マス)</option>
  <option value="super_easy">超初級 (空白5マス)</option> 
  <option value="easy">初級 (空白30)</option>
  <option value="normal" selected>中級 (空白40)</option>
  <option value="hard">上級 (空白50)</option>
</select>
  <button id="reset-btn">新しい盤面で開始</button>
</div>

<div id="error-message" style="height: 24px; font-size: 16px; font-weight: bold; color: red; margin-bottom: 5px;"></div>

<div id="board-container"></div>
<input type="text" inputmode="numeric" pattern="[1-9]*" id="hidden-input" style="position: fixed; top: 50%; left: 50%; opacity: 0; pointer-events: none; width: 1px; height: 1px;">
<button id="chat-clear" style="margin-bottom: 5px; padding: 2px 8px; cursor: pointer; font-size: 12px;">チャット履歴をクリア</button>

<div id="chat-box"></div>
<input id="chat-input" type="text" placeholder="メッセージ">
<button id="chat-send">送信</button>

<script src="client.js"></script>
</body>
</html>
