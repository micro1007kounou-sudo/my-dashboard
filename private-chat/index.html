<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>プライベートチャット（2人専用）</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-notice">
  ブラウザを閉じると、あなたの画面の内容はすべて消去されます。相手側には残りますが、相手がブラウザを閉じた時点で相手側の内容も完全に消去されます。<br>
  メッセージはサーバーに保存されず、LAN 内のみで通信します。
</div>


<div class="chat-container">

  <div class="chat-header">
    プライベートチャット（2人専用）<br>
    あなたのIP: <span id="selfIp">取得中...</span><br>
    相手のIP: <span id="otherIp">未接続</span>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input id="msgInput" type="text" placeholder="メッセージを入力…">
    <button id="sendBtn">送信</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
