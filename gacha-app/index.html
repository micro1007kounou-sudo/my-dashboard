<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ミニガチャゲーム</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>ミニガチャゲーム</h1>
  <button id="gachaButton">ガチャを引く</button>

  <div id="result"></div>

  <h3>ガチャログ</h3>
  <div id="logArea"></div>

  <!-- フラッシュと粒子（script.js より前に置く） -->
  <div id="flashEffect"></div>
  <div id="particleContainer"></div>

  <script src="script.js"></script>

<div id="footer"></div>
<script>
  fetch("../footer.html")
    .then(res => res.text())
    .then(html => document.getElementById("footer").innerHTML = html);
</script>

</body>
</html>
